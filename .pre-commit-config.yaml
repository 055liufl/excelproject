# pre-commit hooks for Qt 5.12.12 + C++17 dynamic library project.
# Run: pre-commit run --all-files
# Update: pre-commit autoupdate
---
fail_fast: false
default_install_hook_types: [pre-commit, commit-msg]

repos:
  # ---- General hygiene ----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key

  # ---- C / C++ formatting (clang-format) ----
  # Requires clang-format installed on the system PATH.
  # Comment out this block if clang-format is not yet installed.
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        types_or: [c, c++]
        args: [--style=file, -i]
        # Skip third-party code: vendored libraries (QXlsx) follow their own style.
        exclude: ^3rdparty/

  # ---- CMake formatting ----
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
        # Skip third-party CMake files (we author 3rdparty/QXlsx/CMakeLists.txt
        # ourselves, but it's a glue layer — keep our local edits intact).
        exclude: ^3rdparty/QXlsx/CMakeLists\.txt$
      - id: cmake-lint
        args: [--disabled-codes, C0103, C0301]
        exclude: ^3rdparty/QXlsx/CMakeLists\.txt$

  # ---- YAML lint ----
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-d, "{extends: relaxed, rules: {line-length: {max: 160}}}"]

  # ---- (Optional) Shell scripts ----
  # shellcheck-py downloads a shellcheck binary during install which is flaky
  # in restricted networks. Enable when the project actually has shell scripts
  # AND the system `shellcheck` binary is installed (apt install shellcheck),
  # then switch to a local hook:
  #   - repo: local
  #     hooks:
  #       - id: shellcheck
  #         name: shellcheck
  #         entry: shellcheck
  #         language: system
  #         types: [shell]

  # ---- (Optional) Markdown lint ----
  # markdownlint-cli pulls Node via nodeenv during hook install which is flaky
  # in restricted networks. Enable later once needed, e.g.:
  #   npm i -g markdownlint-cli
  #   - repo: local
  #     hooks:
  #       - id: markdownlint
  #         name: markdownlint
  #         entry: markdownlint
  #         language: system
  #         types: [markdown]
  #         args: [--disable, MD013, MD033, MD041, "--"]

  # ---- Conventional Commits (commit message gate) ----
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert
